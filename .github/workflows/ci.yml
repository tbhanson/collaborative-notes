# .github/workflows/ci.yml
#
# Runs on every push and pull request.
# Checks that the Racket files compile and migrations load cleanly.
# Add rackunit tests under tests/ and extend the Test step when ready.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: "stable"

      - name: Install dependencies
        run: |
          raco pkg install --auto --batch \
            koyo-lib \
            gregor-lib \
            threading-lib

      - name: Check compilation
        run: |
          raco make main.rkt

      - name: Run tests
        run: |
          # Placeholder: run any rackunit test files found under tests/
          if ls tests/*.rkt 2>/dev/null; then
            raco test tests/
          else
            echo "No tests yet — skipping."
          fi

