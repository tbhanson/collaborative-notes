# .github/workflows/ci.yml
#
# Runs on every push and pull request.
# Checks that the Racket files compile and migrations load cleanly.
# Add rackunit tests under tests/ and extend the Test step when ready.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: "stable"

      - name: Install dependencies
        run: |
          raco pkg install --auto --batch \
            koyo-lib \
            db-lib \
            sqlite-native \
            gregor-lib \
            threading-lib

      - name: Check compilation
        run: |
          raco make main.rkt

      - name: Run tests
        run: |
          # Placeholder: run any rackunit test files found under tests/
          if ls tests/*.rkt 2>/dev/null; then
            raco test tests/
          else
            echo "No tests yet — skipping."
          fi

  deploy:
    # Only deploy from main, and only if CI passes.
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}   # e.g. 1.2.3.4
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}   # e.g. deploy
          DEPLOY_KEY:  ${{ secrets.DEPLOY_KEY }}    # SSH private key
        run: |
          # Write the SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Copy files and restart
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'bash /opt/family-glossary/deploy/deploy.sh'
